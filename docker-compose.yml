services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes --protected-mode yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: spring_app
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 800M
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST}
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      MAIL_FROM: ${MAIL_FROM}
      MASTERS_API_URL: ${MASTERS_API_URL}
      SMART_API_KEY: ${SMART_API_KEY}
      SMART_API_URL: ${SMART_API_URL}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      YOOKASSA_API_URL: ${YOOKASSA_API_URL}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL}
      YOOKASSA_CURRENCY: RUB
      APP_BASE_URL: ${APP_BASE_URL}
      QR_COLOR: "#6366f1"

volumes:
  pgdata:
  redis_data: