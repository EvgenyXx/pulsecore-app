spring:
      cache:
            type: caffeine
            caffeine:
                  spec: expireAfterWrite=15m
      datasource:
            url: ${SPRING_DATASOURCE_URL}
            username: ${SPRING_DATASOURCE_USERNAME}
            password: ${SPRING_DATASOURCE_PASSWORD}
      jpa:
            hibernate:
                  ddl-auto: none
            show-sql: false
      flyway:
            enabled: true
            locations: classpath:db/migration
            baseline-on-migrate: true
            baseline-version: 0
      mail:
            host: ${MAIL_HOST}
            port: ${MAIL_PORT}
            username: ${MAIL_USER}
            password: ${MAIL_PASS}
            protocol: smtps
            properties:
                  mail:
                        smtp:
                              auth: true
                              starttls:
                                    enable: true
      data:
            redis:
                  host: ${SPRING_REDIS_HOST:redis}
                  port: 6379
                  password: ${SPRING_REDIS_PASSWORD:}
      session:
            store-type: redis

logging:
      level:
            org.hibernate.SQL: warn
            org.flywaydb: debug
            ru.pulsecore.app.modules.lineup.client.MastersApiClient: WARN

app:

      gigachat:
            auth-key: ${GIGACHAT_AUTH_KEY}
      admin:
            email: ${ADMIN_EMAIL}
      yookassa:
            shop-id: ${YOOKASSA_SHOP_ID}
            secret-key: ${YOOKASSA_SECRET_KEY}
            return-url: ${YOOKASSA_RETURN_URL}
            yookassa-api-url: ${YOOKASSA_API_URL}
            currency: ${YOOKASSA_CURRENCY}
      masters-api:
            url: ${MASTERS_API_URL}
            method: POST
            user-agent: Mozilla/5.0
            action: tourslist
            country: RUS
            timeout: 45000
      mail:
            from: ${MAIL_FROM}
            verification:
                  subject: "PulseCore — Код подтверждения"
                  text: "Ваш код подтверждения: %s\n\nВведите его в приложении."
            reset:
                  subject: "PulseCore — Сброс пароля"
                  text: "Ваш код для сброса пароля: %s\n\nЕсли вы не запрашивали сброс, проигнорируйте это письмо."

server:
      servlet:
            session:
                  timeout: 30d
                  cookie:
                        name: PULSECORE_SESSION
                        secure: true
                        max-age: 30d