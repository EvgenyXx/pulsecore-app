spring:
      security:
            oauth2:
                  client:
                        registration:
                              yandex:
                                    client-id: ${YANDEX_CLIENT_ID}
                                    client-secret: ${YANDEX_CLIENT_SECRET}
                                    authorization-grant-type: authorization_code
                                    redirect-uri: "{baseUrl}/login/oauth2/code/yandex"
                                    scope:
                                          - login:email
                                          - login:info
                                          - login:default_phone
                              vk:
                                    client-id: ${VK_CLIENT_ID}
                                    client-secret: ${VK_CLIENT_SECRET}
                                    authorization-grant-type: authorization_code
                                    redirect-uri: "{baseUrl}/login/oauth2/code/vk"
                                    scope:
                                          - email
                                          - phone
                        provider:
                              yandex:
                                    authorization-uri: https://oauth.yandex.ru/authorize
                                    token-uri: https://oauth.yandex.ru/token
                                    user-info-uri: https://login.yandex.ru/info
                                    user-name-attribute: id
                              vk:
                                    authorization-uri: https://id.vk.com/authorize
                                    token-uri: https://id.vk.com/oauth2/auth
                                    user-info-uri: https://id.vk.com/oauth2/user_info
                                    user-name-attribute: user_id
      cache:
            type: caffeine
            caffeine:
                  spec: expireAfterWrite=15m
      datasource:
            url: ${SPRING_DATASOURCE_URL}
            username: ${SPRING_DATASOURCE_USERNAME}
            password: ${SPRING_DATASOURCE_PASSWORD}
      jpa:
            hibernate:
                  ddl-auto: none
            show-sql: false
      flyway:
            enabled: true
            locations: classpath:db/migration
            baseline-on-migrate: true
            baseline-version: 0
      mail:
            host: ${MAIL_HOST}
            port: ${MAIL_PORT}
            username: ${MAIL_USER}
            password: ${MAIL_PASS}
            protocol: smtps
            properties:
                  mail:
                        smtp:
                              auth: true
                              starttls:
                                    enable: true
      data:
            redis:
                  host: ${SPRING_REDIS_HOST:redis}
                  port: 6379
                  password: ${SPRING_REDIS_PASSWORD:}
      session:
            store-type: redis
            timeout: 30d

logging:
      level:
            org.hibernate.SQL: warn
            org.flywaydb: debug
            ru.pulsecore.app.modules.lineup.client.MastersApiClient: WARN

app:
      smart:
            api-key: ${SMART_API_KEY}
            api-url: ${SMART_API_URL}
      admin:
            email: ${ADMIN_EMAIL}
      yookassa:
            shop-id: ${YOOKASSA_SHOP_ID}
            secret-key: ${YOOKASSA_SECRET_KEY}
            return-url: ${YOOKASSA_RETURN_URL}
            yookassa-api-url: ${YOOKASSA_API_URL}
            currency: ${YOOKASSA_CURRENCY}
      masters-api:
            url: ${MASTERS_API_URL}
            method: POST
            user-agent: Mozilla/5.0
            action: tourslist
            country: RUS
            timeout: 45000
      mail:
            from: ${MAIL_FROM}
            verification:
                  subject: "PulseCore — Код подтверждения"
                  text: "Ваш код подтверждения: %s\n\nВведите его в приложении."
            reset:
                  subject: "PulseCore — Сброс пароля"
                  text: "Ваш код для сброса пароля: %s\n\nЕсли вы не запрашивали сброс, проигнорируйте это письмо."

server:
      servlet:
            session:
                  timeout: 30d
                  cookie:
                        name: PULSECORE_SESSION
                        secure: true
                        max-age: 30d