spring:
      cache:
            type: caffeine
            caffeine:
                  spec: expireAfterWrite=15m
      datasource:
            url: ${SPRING_DATASOURCE_URL}
            username: ${SPRING_DATASOURCE_USERNAME}
            password: ${SPRING_DATASOURCE_PASSWORD}
      mail:
            host: ${MAIL_HOST}
            port: ${MAIL_PORT}
            username: ${MAIL_USER}
            password: ${MAIL_PASS}
            protocol: smtps
            properties:
                  mail:
                        smtp:
                              auth: true
                              starttls:
                                    enable: true
      data:
            redis:
                  host: ${SPRING_REDIS_HOST:redis}
                  port: 6379
      session:
            store-type: redis

app:
      admin:
            email: ${ADMIN_EMAIL}
      yookassa:
            shop-id: ${YOOKASSA_SHOP_ID}
            secret-key: ${YOOKASSA_SECRET_KEY}
      masters-api:
            url: https://masters-league.com/wp-admin/admin-ajax.php
            method: POST
            user-agent: Mozilla/5.0
            action: tourslist
            country: RUS
            timeout: 20000
      mail:
            from: ${MAIL_FROM}
            verification:
                  subject: "PulseCore — Код подтверждения"
                  text: "Ваш код подтверждения: %s\n\nВведите его в приложении."
            reset:
                  subject: "PulseCore — Сброс пароля"
                  text: "Ваш код для сброса пароля: %s\n\nЕсли вы не запрашивали сброс, проигнорируйте это письмо."

server:
      servlet:
            session:
                  timeout: 30d
                  cookie:
                        name: PULSECORE_SESSION
                        secure: true
                        max-age: 30d