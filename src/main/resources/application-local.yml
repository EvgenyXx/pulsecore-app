spring:
  security:
    oauth2:
      client:
        registration:
          yandex:
            client-id: ${YANDEX_CLIENT_ID}
            client-secret: ${YANDEX_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/yandex"
            scope:
              - login:email
              - login:info
              - login:default_phone
        provider:
          yandex:
            authorization-uri: https://oauth.yandex.ru/authorize
            token-uri: https://oauth.yandex.ru/token
            user-info-uri: https://login.yandex.ru/info
            user-name-attribute: id
  cache:
    type: redis
    redis:
      time-to-live: 6h

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
  session:
    store-type: redis
    timeout: 14d

logging:
  level:
    org.hibernate.SQL: warn
    org.flywaydb: debug
    ru.pulsecore.app.modules.lineup.client.MastersApiClient: WARN
    org.springframework.cache: TRACE                 # ← добавить
    org.springframework.data.redis.cache: DEBUG      # ← добавить

app:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY}
    private-key: ${VAPID_PRIVATE_KEY}
  smart:
    key: ${SMART_API_KEY}
    url: ${SMART_API_URL}
  admin:
    email: ${ADMIN_EMAIL}
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID}
    secret-key: ${YOOKASSA_SECRET_KEY}
  masters-api:
    url: ${MASTERS_API_URL}
    method: POST
    user-agent: Mozilla/5.0
    action: tourslist
    country: RUS
    timeout: 45000
  mail:
    from: ${MAIL_FROM}
    verification:
      subject: PulseCore — Код подтверждения
      text: "Ваш код подтверждения: %s\n\nВведите его в приложении."
    reset:
      subject: PulseCore — Сброс пароля
      text: "Ваш код для сброса пароля: %s\n\nЕсли вы не запрашивали сброс, проигнорируйте это письмо."

server:
  address: 0.0.0.0
  servlet:
    session:
      persistent: true
      timeout: 14d
      cookie:
        name: PULSECORE_SESSION
        http-only: true
        secure: false
        max-age: 14d