<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PulseCore — Подписка</title>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; min-height: 100dvh; background: #06060f; position: relative; overflow-x: hidden; }
        .bg-mesh { position: fixed; inset: 0; z-index: -5; background-image: radial-gradient(circle at 20% 30%, rgba(245,158,11,0.06) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(251,191,36,0.05) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(217,119,6,0.04) 0%, transparent 70%); }
        .bg-grid { position: fixed; inset: 0; z-index: -4; opacity: 0.10; background-image: linear-gradient(rgba(245,158,11,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.06) 1px, transparent 1px); background-size: 60px 60px; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -3; animation: orbFloat 8s ease-in-out infinite; }
        .bg-orb-1 { width: 400px; height: 400px; background: rgba(245,158,11,0.04); top: -100px; right: -100px; }
        .bg-orb-2 { width: 300px; height: 300px; background: rgba(251,191,36,0.04); bottom: -50px; left: -50px; animation-delay: -4s; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-sidebar { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.06); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 10px; cursor: pointer; color: #9ca3af; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(245,158,11,0.08); color: #fcd34d; }
        .nav-item.active { background: rgba(245,158,11,0.12); color: #fbbf24; border-left-color: #f59e0b; }
        .plan-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 28px; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; position: relative; overflow: hidden; }
        .plan-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-4px); }
        .plan-card.selected { border-color: #f59e0b; box-shadow: 0 0 30px rgba(245,158,11,0.2); }
        .plan-card.popular { border-color: rgba(245,158,11,0.4); }
        .plan-card.popular::before { content: "🔥 ВЫГОДНО"; position: absolute; top: 12px; right: -28px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-size: 0.65rem; font-weight: 700; padding: 3px 36px; transform: rotate(45deg); letter-spacing: 0.5px; }
        .price-old { text-decoration: line-through; color: #6b7280; font-size: 0.9rem; }
        .pro-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-weight: 700; font-size: 0.65rem; padding: 3px 12px; border-radius: 20px; box-shadow: 0 0 15px rgba(245,158,11,0.4); animation: proPulse 2s ease-in-out infinite; }
        @keyframes proPulse { 0%, 100% { box-shadow: 0 0 15px rgba(245,158,11,0.4); } 50% { box-shadow: 0 0 30px rgba(245,158,11,0.8); } }
        .amount-gold { color: #fbbf24; }
        .btn-pay { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 20px rgba(245,158,11,0.3); }
        .btn-pay:hover { box-shadow: 0 8px 30px rgba(245,158,11,0.5); transform: translateY(-2px); }
        .skeleton { background: rgba(255,255,255,0.05); border-radius: 8px; animation: skeletonPulse 1.5s ease-in-out infinite; }
        @keyframes skeletonPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="flex min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>

<aside class="glass-sidebar w-20 md:w-56 min-h-screen p-3 md:p-4 flex flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-2 md:gap-3 mb-8 justify-center md:justify-start">
        <img src="/img.png" alt="PulseCore" class="w-9 h-9 md:w-10 md:h-10 rounded-xl shadow-lg object-cover shrink-0">
        <div class="hidden md:block"><h1 class="text-sm md:text-lg font-bold bg-gradient-to-r from-amber-400 to-yellow-400 bg-clip-text text-transparent">PulseCore</h1></div>
    </div>
    <nav class="flex flex-col gap-1 flex-1">
        <a href="/dashboard" class="nav-item justify-center md:justify-start"><span class="text-lg">🏠</span><span class="hidden md:inline text-sm">Главная</span></a>
        <div class="nav-item active justify-center md:justify-start"><span class="text-lg">💳</span><span class="hidden md:inline text-sm">Подписка</span></div>
        <a href="/profile" class="nav-item justify-center md:justify-start"><span class="text-lg">👤</span><span class="hidden md:inline text-sm">Профиль</span></a>
    </nav>
    <button onclick="logout()" class="flex items-center justify-center md:justify-start gap-2 text-gray-500 hover:text-red-400 text-xs md:text-sm mt-auto py-2"><span>🚪</span><span class="hidden md:inline">Выйти</span></button>
</aside>

<main class="flex-1 p-4 md:p-8 relative z-10 overflow-y-auto max-h-screen">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-3 md:gap-4 mb-8">
            <div class="text-4xl">💎</div>
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-white">Подписка PulseCore <span class="pro-badge align-middle ml-2">PRO</span></h2>
                <p class="text-xs md:text-sm text-gray-500" id="pageSubtitle">Загрузка...</p>
            </div>
        </div>

        <div id="activeSubBlock" class="hidden">
            <div class="glass rounded-2xl p-8 text-center">
                <div class="text-6xl mb-4">✅</div>
                <h3 class="text-xl font-bold text-amber-400 mb-2">Подписка активна</h3>
                <p class="text-gray-400" id="activeSubText"></p>
            </div>
        </div>

        <div id="plansBlock" class="hidden">
            <p class="text-sm text-gray-400 mb-4">Выберите тарифный план</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6" id="plansContainer">
                <!-- Планы генерируются динамически -->
            </div>
            <div id="messageBox" class="text-sm text-center mb-4 hidden"></div>
            <button onclick="handlePay()" id="payBtn" class="btn btn-lg w-full btn-pay border-0 text-black font-bold text-lg" disabled>💳 Оплатить</button>
        </div>
    </div>
</main>

<script>
    let playerId = null;
    let selectedPlan = null;
    let prices = {};

    async function init() {
        try {
            const res = await fetch("/api/auth/me", { credentials: "same-origin" });
            if (!res.ok) { window.location.href = "/"; return; }
            playerId = (await res.json()).id;
            await Promise.all([loadPrices(), loadSubscription()]);
        } catch (e) { window.location.href = "/"; }
    }

    async function loadPrices() {
        try {
            const res = await fetch("/api/prices");
            if (!res.ok) throw new Error("Цены не загружены");
            prices = await res.json();
            renderPlans();
            document.getElementById("pageSubtitle").textContent = "Выберите тариф";
        } catch (e) {
            document.getElementById("pageSubtitle").textContent = "Ошибка загрузки цен";
        }
    }

    function getMonthLabel(months) {
        if (months === 1) return "1 месяц";
        const lastDigit = months % 10;
        const lastTwo = months % 100;
        if (lastTwo >= 11 && lastTwo <= 14) return months + " месяцев";
        if (lastDigit === 1) return months + " месяц";
        if (lastDigit >= 2 && lastDigit <= 4) return months + " месяца";
        return months + " месяцев";
    }

    function getPricePerMonth(total, months) {
        return Math.round(total / months);
    }

    function getDiscountPercent(price1, priceN, months) {
        const fullPrice = price1 * months;
        return Math.round((1 - priceN / fullPrice) * 100);
    }

    function renderPlans() {
        const container = document.getElementById("plansContainer");
        const entries = Object.entries(prices).map(([months, price]) => ({
            months: parseInt(months),
            price: price
        })).sort((a, b) => a.months - b.months);

        if (entries.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center col-span-full">Нет доступных тарифов</p>';
            return;
        }

        const basePrice = entries[0].price;
        const mostPopular = entries.length > 1 ? entries[entries.length - 1] : entries[0];

        container.innerHTML = entries.map((plan, index) => {
            const isPopular = plan.months === mostPopular.months && entries.length > 1;
            const discount = plan.months > 1 ? getDiscountPercent(basePrice, plan.price, plan.months) : 0;
            const perMonth = getPricePerMonth(plan.price, plan.months);
            const fullPrice = basePrice * plan.months;
            const hasDiscount = plan.months > 1 && plan.price < fullPrice;

            return `
                <div class="plan-card text-center ${isPopular ? 'popular' : ''}" id="plan${plan.months}" onclick="selectPlan(${plan.months})">
                    <div class="text-4xl mb-4">${index === 0 ? '⭐' : '🌟'}</div>
                    <h3 class="text-lg font-bold text-white mb-1">${getMonthLabel(plan.months)}</h3>
                    <p class="text-xs text-gray-500 mb-3">
                        ${hasDiscount ? 'Экономия ' + discount + '%' : 'Полный доступ ко всем функциям'}
                    </p>
                    <p class="text-3xl font-bold amount-gold">${plan.price} ₽</p>
                    <p class="text-xs text-gray-400 mt-1">
                        ${hasDiscount ? '<span class="price-old">' + fullPrice + ' ₽</span> ' : ''}
                        ${perMonth} ₽ / месяц
                    </p>
                </div>
            `;
        }).join("");

        document.getElementById("plansBlock").classList.remove("hidden");
    }

    async function loadSubscription() {
        try {
            const res = await fetch(`/api/player/subscription`, { credentials: "same-origin" });
            if (res.ok) {
                const sub = await res.json();
                if (sub && sub.active) {
                    document.getElementById("activeSubBlock").classList.remove("hidden");
                    document.getElementById("plansBlock").classList.add("hidden");
                    const exp = sub.expiresAt ? new Date(sub.expiresAt).toLocaleDateString("ru-RU") : "неизвестно";
                    document.getElementById("activeSubText").textContent = `Действует до ${exp}`;
                    document.getElementById("pageSubtitle").textContent = "Активна";
                }
            }
        } catch (e) {}
    }

    function selectPlan(months) {
        selectedPlan = months;
        document.querySelectorAll(".plan-card").forEach(card => card.classList.remove("selected"));
        document.getElementById(`plan${months}`).classList.add("selected");
        document.getElementById("payBtn").disabled = false;
    }

    async function handlePay() {
        if (!selectedPlan) return;
        try {
            const res = await fetch(`/api/player/pay?months=${selectedPlan}`, { method: "POST", credentials: "same-origin" });            const data = await res.json();
            window.location.href = data.confirmationUrl;
        } catch (e) { alert("Ошибка при создании платежа"); }
    }

    function logout() { fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" }).then(() => { window.location.href = "/"; }); }
    init();
</script>
</body>
</html>
