<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PulseCore — Подписка</title>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .plan-card {
            background: rgba(255,255,255,0.025); border-radius: 16px; padding: 28px 24px;
            border: 1px solid rgba(99,102,241,0.12); cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.25s ease;
        }
        .plan-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(99,102,241,0.30); transform: translateY(-2px); }
        .plan-card.selected { border-color: #6366f1; box-shadow: 0 0 40px rgba(99,102,241,0.15); }
        .plan-card.popular { border-color: rgba(99,102,241,0.35); }
        .plan-card.popular::before {
            content: "ВЫГОДНО"; position: absolute; top: 14px; right: -30px;
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-size: 0.6rem; font-weight: 700; padding: 3px 38px;
            transform: rotate(45deg); letter-spacing: 0.5px;
        }
        .price-old { text-decoration: line-through; color: #71717a; font-size: 0.85rem; }
        .pro-badge {
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-weight: 700; font-size: 0.6rem; padding: 2px 10px; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 3px;
        }
        .amount-gold { color: #818cf8; font-weight: 700; }
        .btn-pay {
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-weight: 600; border: none; border-radius: 12px; padding: 14px 24px;
            cursor: pointer; font-size: 1rem; transition: all 0.2s ease;
        }
        .btn-pay:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-pay:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="flex min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div class="stars" id="starsContainer"></div>

<aside class="glass-sidebar w-20 md:w-56 min-h-screen p-3 md:p-4 flex flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-2 md:gap-3 mb-8 justify-center md:justify-start">
        <img src="/img.png" alt="PulseCore" class="w-9 h-9 md:w-10 md:h-10 rounded-xl shadow-lg object-cover shrink-0">
        <div class="hidden md:block"><h1 class="text-sm md:text-lg font-bold bg-gradient-to-r from-indigo-400 to-indigo-300 bg-clip-text text-transparent">PulseCore</h1></div>
    </div>
    <nav class="flex flex-col gap-1 flex-1">
        <a href="/dashboard" class="nav-item justify-center md:justify-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="hidden md:inline text-sm">Главная</span>
        </a>
        <div class="nav-item active justify-center md:justify-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span class="hidden md:inline text-sm">Подписка</span>
        </div>
        <a href="/profile" class="nav-item justify-center md:justify-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="hidden md:inline text-sm">Профиль</span>
        </a>
    </nav>
    <button onclick="logout()" class="flex items-center justify-center md:justify-start gap-2 text-zinc-500 hover:text-red-400 text-xs md:text-sm mt-auto py-2 px-2 rounded-lg hover:bg-red-500/5">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="hidden md:inline">Выйти</span>
    </button>
</aside>

<main class="flex-1 p-4 md:p-8 relative z-10 overflow-y-auto max-h-screen">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-3 md:gap-4 mb-8">
            <div class="w-12 h-12 rounded-xl bg-indigo-500/20 flex items-center justify-center">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            </div>
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-white">Подписка PulseCore <span class="pro-badge align-middle ml-2">PRO</span></h2>
                <p class="text-xs md:text-sm text-zinc-400" id="pageSubtitle">Загрузка...</p>
            </div>
        </div>

        <div id="activeSubBlock" class="hidden">
            <div class="widget-card rounded-2xl p-8 text-center">
                <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Подписка активна</h3>
                <p class="text-zinc-400" id="activeSubText"></p>
            </div>
        </div>

        <div id="plansBlock" class="hidden">
            <p class="text-sm text-zinc-400 mb-4">Выберите тарифный план</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6" id="plansContainer"></div>
            <div id="messageBox" class="text-sm text-center mb-4 hidden"></div>
            <button onclick="handlePay()" id="payBtn" class="btn-pay w-full" disabled>Оплатить</button>
        </div>
    </div>
</main>

<script type="module" src="/js/subscribe-app.js"></script>
<script>
    (function() {
        const container = document.getElementById('starsContainer');
        if (!container) return;
        const count = 100;
        let html = '';
        for (let i = 0; i < count; i++) {
            const size = Math.random() * 2.5 + 0.5;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;
            html += `<div class="star" style="
                width:${size}px; height:${size}px;
                left:${x}%; top:${y}%;
                --duration:${duration}s;
                --delay:${delay}s;
            "></div>`;
        }
        container.innerHTML = html;
    })();
</script>
</body>
</html>
