<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PulseCore — Админ-панель</title>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '475px', 'sm': '640px', 'md': '768px',
                        'lg': '1024px', 'xl': '1280px', '2xl': '1536px',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }
        * { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: #020b08;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: pan-y pinch-zoom;
        }
        .bg-mesh {
            position: fixed; inset: 0; z-index: -5;
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(16,185,129,0.12) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(20,184,166,0.10) 0%, transparent 40%),
                    radial-gradient(circle at 50% 50%, rgba(52,211,153,0.04) 0%, transparent 60%);
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: -4; opacity: 0.10;
            background-image:
                    linear-gradient(rgba(16,185,129,0.06) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(16,185,129,0.06) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        @media (max-width: 767px) { .bg-grid { background-size: 32px 32px; } }
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(140px); z-index: -3;
            animation: orbFloat 10s ease-in-out infinite; pointer-events: none;
        }
        .bg-orb-1 {
            width: clamp(250px, 40vw, 500px); height: clamp(250px, 40vw, 500px);
            background: rgba(16,185,129,0.06); top: -15%; right: -10%;
        }
        .bg-orb-2 {
            width: clamp(200px, 30vw, 400px); height: clamp(200px, 30vw, 400px);
            background: rgba(20,184,166,0.05); bottom: -10%; left: -8%; animation-delay: -5s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(25px, -25px) scale(1.08); }
            66% { transform: translate(-15px, 20px) scale(0.95); }
        }
        .glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .glass-strong {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(255,255,255,0.10);
        }
        .glass-nav {
            background: rgba(2,11,8,0.85);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-right: 1px solid rgba(16,185,129,0.08);
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 18px; border-radius: 14px; cursor: pointer;
            color: #6b8a7a; border-left: 3px solid transparent;
            user-select: none; -webkit-user-select: none;
            transition: all 0.2s ease;
        }
        .nav-item:active { transform: scale(0.97); }
        .nav-item:hover { background: rgba(16,185,129,0.10); color: #a7f3d0; }
        .nav-item.active {
            background: rgba(16,185,129,0.15); color: #6ee7b7;
            border-left-color: #10b981;
            box-shadow: inset 0 0 20px rgba(16,185,129,0.05);
        }
        .nav-item .nav-icon { font-size: 1.25rem; flex-shrink: 0; width: 24px; text-align: center; line-height: 1; }
        .stat-card {
            background: rgba(255,255,255,0.02); border-radius: 18px;
            padding: clamp(16px, 3vw, 22px);
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(16,185,129,0.10);
        }
        .content-panel { animation: slideIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .btn-3d { transition: all 0.25s ease; }
        .btn-3d:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,0.3); }
        .btn-3d:active { transform: translateY(0) scale(0.97); }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12), 0 0 20px rgba(16,185,129,0.08);
            border-color: rgba(52,211,153,0.5) !important;
        }
        .player-card {
            background: rgba(255,255,255,0.02); border-radius: 16px;
            padding: 14px 18px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s ease;
        }
        .player-card:hover {
            background: rgba(16,185,129,0.06);
            border-color: rgba(16,185,129,0.15);
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(16,185,129,0.10); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16,185,129,0.20); }
        * { scrollbar-width: thin; scrollbar-color: rgba(16,185,129,0.10) transparent; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>

<aside class="hidden md:flex glass-nav w-72 min-h-screen p-6 flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-3 mb-10 px-1">
        <div class="w-11 h-11 rounded-xl bg-emerald-500/15 flex items-center justify-center shadow-lg">
            <span class="text-2xl">🛡️</span>
        </div>
        <div>
            <h1 class="text-lg font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent tracking-tight">PulseCore</h1>
            <p class="text-xs text-emerald-700/60">Админ-панель</p>
        </div>
    </div>
    <nav class="flex flex-col gap-1 flex-1">
        <div class="nav-item active" id="nav-players">
            <span class="nav-icon">👤</span>
            <div>
                <div class="font-medium text-sm">Игроки</div>
                <div class="text-xs opacity-60">Поиск и подписки</div>
            </div>
        </div>
        <a href="/dashboard.html" class="nav-item mt-auto">
            <span class="nav-icon">🏠</span>
            <div>
                <div class="font-medium text-sm">Дашборд</div>
                <div class="text-xs opacity-60">Вернуться</div>
            </div>
        </a>
    </nav>
    <button onclick="logout()" class="flex items-center gap-2 text-gray-500 hover:text-red-400 text-sm mt-4 py-3 px-4 rounded-xl hover:bg-red-500/5 transition-colors w-full">🚪 Выйти</button>
</aside>

<main class="flex-1 relative z-10 p-4 sm:p-6 md:p-8 lg:p-10">
    <div class="max-w-3xl mx-auto w-full content-panel">
        <div class="mb-8">
            <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">👤 Игроки</h2>
            <p class="text-emerald-700/50 mt-1.5 text-sm">Поиск и управление подписками</p>
        </div>

        <div class="glass rounded-2xl p-5 sm:p-6 mb-5">
            <label class="text-xs text-emerald-500/60 mb-2 block font-medium uppercase tracking-wider">🔍 Поиск игрока</label>
            <input id="searchInput" type="text" placeholder="Имя, фамилия или email..." class="input input-bordered w-full bg-white/3 text-white input-glow" oninput="searchPlayers()">
            <div id="searchResults" class="mt-3 space-y-2 hidden"></div>
        </div>

        <div id="selectedPlayer" class="glass rounded-2xl p-5 sm:p-6 hidden">
            <div class="flex justify-between items-start mb-4 flex-wrap gap-2">
                <div>
                    <p class="text-xs text-emerald-500/60 uppercase tracking-wider mb-1">Выбранный игрок</p>
                    <p class="text-white font-semibold text-lg" id="selName"></p>
                    <p class="text-sm text-gray-500" id="selEmail"></p>
                </div>
                <span id="selSubBadge" class="badge badge-sm"></span>
            </div>
            <div class="flex gap-2">
                <button onclick="giveSub(30)" class="btn btn-sm bg-emerald-600 hover:bg-emerald-500 text-white border-0 flex-1 btn-3d">⚡ 30 дней</button>
                <button onclick="giveSub(60)" class="btn btn-sm bg-teal-600 hover:bg-teal-500 text-white border-0 flex-1 btn-3d">💎 60 дней</button>
            </div>
            <p id="subResult" class="text-xs text-center mt-3 hidden"></p>
        </div>
    </div>
</main>

<script>
    let selectedPlayerId = null;
    let playersCache = {};

    async function searchPlayers() {
        const q = document.getElementById("searchInput").value.trim();
        const results = document.getElementById("searchResults");
        if (q.length < 2) { results.classList.add("hidden"); return; }

        try {
            const res = await fetch(`/api/player/search?q=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error();
            const players = await res.json();

            const subStatuses = {};
            await Promise.all(players.map(async p => {
                try {
                    const sres = await fetch(`/api/player/${p.id}/subscription`);
                    if (sres.ok) {
                        subStatuses[p.id] = await sres.json();
                        playersCache[p.id] = subStatuses[p.id];
                    }
                } catch(e) {}
            }));

            results.classList.remove("hidden");
            results.innerHTML = players.map(p => {
                const sub = subStatuses[p.id];
                const isActive = sub && sub.active === true;
                const subBadge = isActive
                    ? `<span class="badge badge-sm bg-emerald-500/15 text-emerald-400 border-0">Активна до ${new Date(sub.expiresAt).toLocaleDateString("ru-RU")}</span>`
                    : '<span class="badge badge-sm bg-red-500/15 text-red-400 border-0">Нет подписки</span>';
                return `
                    <div class="player-card flex justify-between items-center" onclick="selectPlayer('${p.id}','${p.name.replace(/'/g, "\\'")}','${p.email.replace(/'/g, "\\'")}', ${isActive})">
                        <div>
                            <div class="flex items-center gap-2 flex-wrap"><p class="text-white text-sm font-semibold">${p.name}</p>${subBadge}</div>
                            <p class="text-xs text-gray-500 mt-0.5">${p.email}</p>
                        </div>
                        <span class="text-emerald-400 text-sm flex-shrink-0 ml-2">Выбрать →</span>
                    </div>
                `;
            }).join("");
        } catch (e) { results.innerHTML = '<p class="text-red-400 text-sm text-center py-3">❌ Ошибка загрузки</p>'; }
    }

    function selectPlayer(id, name, email, isActive) {
        selectedPlayerId = id;
        document.getElementById("selName").textContent = name;
        document.getElementById("selEmail").textContent = email;
        const badge = document.getElementById("selSubBadge");
        const cached = playersCache[id];
        if (cached && cached.active) {
            badge.textContent = 'Активна до ' + new Date(cached.expiresAt).toLocaleDateString("ru-RU");
            badge.className = 'badge badge-sm bg-emerald-500/15 text-emerald-400 border-0';
        } else {
            badge.textContent = 'Нет подписки';
            badge.className = 'badge badge-sm bg-red-500/15 text-red-400 border-0';
        }
        document.getElementById("selectedPlayer").classList.remove("hidden");
        document.getElementById("searchResults").classList.add("hidden");
        document.getElementById("subResult").classList.add("hidden");
    }

    async function giveSub(days) {
        if (!selectedPlayerId) return;
        const msg = document.getElementById("subResult");
        msg.textContent = "⏳ Выдача...";
        msg.className = "text-xs text-center mt-3 text-gray-400";
        msg.classList.remove("hidden");
        try {
            const res = await fetch(`/api/player/${selectedPlayerId}/subscribe?days=${days}`, { method: "POST" });
            if (!res.ok) throw new Error();
            msg.textContent = `✅ Подписка выдана на ${days} дней`;
            msg.className = "text-xs text-center mt-3 text-emerald-400";
            const sres = await fetch(`/api/player/${selectedPlayerId}/subscription`);
            if (sres.ok) playersCache[selectedPlayerId] = await sres.json();
            const cached = playersCache[selectedPlayerId];
            if (cached && cached.active) {
                const badge = document.getElementById("selSubBadge");
                badge.textContent = 'Активна до ' + new Date(cached.expiresAt).toLocaleDateString("ru-RU");
                badge.className = 'badge badge-sm bg-emerald-500/15 text-emerald-400 border-0';
            }
            searchPlayers();
        } catch (e) {
            msg.textContent = "❌ Ошибка при выдаче";
            msg.className = "text-xs text-center mt-3 text-red-400";
        }
    }

    async function logout() {
        await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
        window.location.href = "/";
    }
</script>
</body>
</html>
