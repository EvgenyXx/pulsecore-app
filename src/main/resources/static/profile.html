<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PulseCore — Профиль</title>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .toggle-wrapper { position: relative; display: inline-flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .toggle-track { width: 52px; height: 28px; border-radius: 28px; position: relative; transition: 0.3s ease; }
        .toggle-track.on { background: #6366f1; }
        .toggle-track.off { background: rgba(255,255,255,0.08); }
        .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: 0.3s ease; }
        .toggle-thumb.on { left: 27px; }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; color: #e5e5e5; padding: 10px 14px; font-size: 0.88rem; font-family: 'Inter'; width: 100%; outline: none; transition: all 0.2s ease; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.10); }
        .btn-indigo { background: #6366f1; color: #fff; font-weight: 600; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s ease; }
        .btn-indigo:hover { background: #4f46e5; }
        .btn-indigo:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline { background: transparent; color: #e5e5e5; font-weight: 500; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 18px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s ease; }
        .btn-outline:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="flex min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div class="stars" id="starsContainer"></div>

<aside class="glass-sidebar w-20 md:w-56 min-h-screen p-3 md:p-4 flex flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-2 md:gap-3 mb-8 justify-center md:justify-start">
        <img src="/img.png" alt="PulseCore" class="w-9 h-9 md:w-10 md:h-10 rounded-xl shadow-lg object-cover shrink-0">
        <div class="hidden md:block"><h1 class="text-sm md:text-lg font-bold bg-gradient-to-r from-indigo-400 to-indigo-300 bg-clip-text text-transparent">PulseCore</h1></div>
    </div>
    <nav class="flex flex-col gap-1 flex-1">
        <a href="/dashboard" class="nav-item justify-center md:justify-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="hidden md:inline text-sm">Главная</span>
        </a>
        <div class="nav-item active justify-center md:justify-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="hidden md:inline text-sm">Профиль</span>
        </div>
    </nav>
    <button onclick="logout()" class="flex items-center justify-center md:justify-start gap-2 text-zinc-500 hover:text-red-400 text-xs md:text-sm mt-auto py-2 px-2 rounded-lg hover:bg-red-500/5">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="hidden md:inline">Выйти</span>
    </button>
</aside>

<main class="flex-1 p-4 md:p-10 relative z-10 overflow-y-auto max-h-screen">
    <div class="max-w-lg">

        <div class="flex items-center gap-3 md:gap-4 mb-8">
            <img src="/img.png" alt="PulseCore" class="w-12 h-12 md:w-14 md:h-14 rounded-xl shadow-lg object-cover shrink-0 ring-1 ring-white/10">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-white" id="profileName">Загрузка...</h2>
                <p class="text-xs md:text-sm text-zinc-500">Настройки аккаунта</p>
            </div>
        </div>

        <div class="widget-card rounded-2xl p-4 md:p-5 mb-3">
            <div class="flex items-center justify-between gap-2 md:gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div>
                        <h3 class="font-semibold text-white text-sm">Уведомления на почту</h3>
                        <p class="text-xs text-zinc-500" id="notifLabel">Загрузка...</p>
                    </div>
                </div>
                <div class="toggle-wrapper" onclick="toggleNotifications()">
                    <div class="toggle-track off" id="toggleTrack"><div class="toggle-thumb" id="toggleThumb"></div></div>
                </div>
            </div>
        </div>

        <div class="widget-card rounded-2xl p-4 md:p-5 mb-3">
            <div class="flex items-center justify-between gap-2 md:gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </div>
                    <div>
                        <h3 class="font-semibold text-white text-sm">Push-уведомления</h3>
                        <p class="text-xs text-zinc-500" id="pushLabel">Загрузка...</p>
                    </div>
                </div>
                <div class="toggle-wrapper" onclick="togglePush()">
                    <div class="toggle-track off" id="pushToggleTrack"><div class="toggle-thumb" id="pushToggleThumb"></div></div>
                </div>
            </div>
        </div>

        <div class="widget-card rounded-2xl p-4 md:p-5 mb-3">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M6 16h.01M10 16h.01M14 16h.01"/></svg>
                </div>
                <div><h3 class="font-semibold text-white text-sm">Email</h3></div>
            </div>
            <input id="emailInput" type="email" class="input-field mb-3" placeholder="your@email.com">
            <button onclick="saveEmail()" id="saveEmailBtn" class="btn-indigo w-full">Сохранить email</button>
        </div>

        <div class="widget-card rounded-2xl p-4 md:p-5 mb-3">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div><h3 class="font-semibold text-white text-sm">Смена пароля</h3></div>
            </div>
            <button onclick="showPasswordForm()" id="changePasswordBtn" class="btn-outline w-full">Изменить пароль</button>
            <div id="passwordForm" class="hidden mt-4 space-y-3">
                <div id="stepOld" class="space-y-3">
                    <div>
                        <label class="text-xs text-zinc-400 mb-1 block">Текущий пароль</label>
                        <div class="relative">
                            <input id="oldPasswordInput" type="password" class="input-field pr-10" placeholder="Введите старый пароль">
                            <button onclick="togglePassword('oldPasswordInput', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 cursor-pointer bg-transparent border-0 p-1">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <p id="oldPasswordError" class="text-xs text-red-400 hidden"></p>
                    <button onclick="checkOldPassword()" id="checkOldBtn" class="btn-indigo w-full">Проверить</button>
                </div>
                <div id="stepNew" class="hidden space-y-3">
                    <div class="border-t border-white/5 pt-3"><p class="text-xs text-emerald-400">Старый пароль подтверждён</p></div>
                    <div>
                        <label class="text-xs text-zinc-400 mb-1 block">Новый пароль</label>
                        <div class="relative">
                            <input id="newPasswordInput" type="password" class="input-field pr-10" placeholder="Минимум 6 символов">
                            <button onclick="togglePassword('newPasswordInput', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 cursor-pointer bg-transparent border-0 p-1">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <p id="newPasswordError" class="text-xs text-red-400 hidden"></p>
                    <button onclick="changePassword()" id="changeBtn" class="btn-indigo w-full">Сменить пароль</button>
                </div>
            </div>
        </div>

        <div class="widget-card rounded-2xl p-4 md:p-5 mb-3">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div>
                    <h3 class="font-semibold text-white text-sm">Дата регистрации</h3>
                    <p class="text-xs text-zinc-500" id="createdAt">—</p>
                </div>
            </div>
        </div>

        <div id="messageBox" class="text-xs md:text-sm mb-4 hidden"></div>
    </div>
</main>

<script type="module" src="/js/profile-app.js"></script>
<script>
    (function() {
        const container = document.getElementById('starsContainer');
        if (!container) return;
        const count = 100;
        let html = '';
        for (let i = 0; i < count; i++) {
            const size = Math.random() * 2.5 + 0.5;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;
            html += `<div class="star" style="
                width:${size}px; height:${size}px;
                left:${x}%; top:${y}%;
                --duration:${duration}s;
                --delay:${delay}s;
            "></div>`;
        }
        container.innerHTML = html;
    })();
</script>
</body>
</html>
